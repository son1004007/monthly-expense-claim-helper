[commute]
# Copy this file to config/commute-rules.local.ini and replace with real names.
# Do not commit the local file because home/office station names can reveal personal commute patterns.
home_stop = HOME_STATION_NAME
office_stop = OFFICE_STATION_NAME

# Both directions are treated as non-claimable regular commute.
# Matching should ignore whitespace around arrows and normalize station suffixes conservatively.
exclude_routes =
  HOME_STATION_NAME -> OFFICE_STATION_NAME
  OFFICE_STATION_NAME -> HOME_STATION_NAME

[transport]
# claimable: send to browser input
# excluded_commute: keep in preview but do not input
# review_required: show in preview and let the user decide
# exception_weekend_no_attendance: mark as exception and do not input
# manual_excluded_strikethrough: user marked the Excel row with strikethrough; never input automatically
regular_commute_action = excluded_commute
manual_strikethrough_action = manual_excluded_strikethrough
manual_strikethrough_overrides = true
preferred_excel_extension = .xlsx
weekend_work_confirmed_action = claimable
weekend_without_attendance_action = exception_weekend_no_attendance
holiday_work_confirmed_action = claimable
holiday_without_attendance_action = exception_weekend_no_attendance
unknown_route_action = claimable
